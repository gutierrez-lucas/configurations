# hypridle.conf
# for more configuration options, refer https://wiki.hyprland.org/Hypr-Ecosystem/hypridle

general {
    lock_cmd = pidof hyprlock || hyprlock       # avoid starting multiple hyprlock instances.
    before_sleep_cmd = loginctl lock-session    # lock before suspend (lid close).
    after_sleep_cmd = hyprctl dispatch dpms on  # turn display back on after wake.
}

# Dim screen backlight at 9 min
listener {
    timeout = 540                                # 9min
    on-timeout = brightnessctl -s set 10         # set monitor backlight to minimum
    on-resume = brightnessctl -r                 # restore monitor backlight
}

# Turn off keyboard backlight at 9 min
listener {
    timeout = 540                                # 9min
    on-timeout = brightnessctl -sd rgb:kbd_backlight set 0
    on-resume = brightnessctl -rd rgb:kbd_backlight
}

# Lock screen at 10 min
listener {
    timeout = 600                                # 10min
    on-timeout = loginctl lock-session
}

# Turn off display at 10 min (slightly after lock)
listener {
    timeout = 605                                # 10min + 5s (after lock)
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on && brightnessctl -r
}

# No suspend listener — system will never sleep/hibernate automatically
