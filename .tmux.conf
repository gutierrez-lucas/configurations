set-option -g default-shell /usr/bin/zsh
set-option -g default-command /usr/bin/zsh

set -g mouse on
set prefix C-s
unbind-key C-b
bind-key C-s send-prefix

set-window-option -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5
set -g default-terminal "screen-256color"
set-window-option -g xterm-keys on
set -g focus-events on
# Easier and faster switching between next/prev window
bind C-p previous-window
bind C-n next-window
# Split panes keeping current directory; new windows start from default
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
# Source .tmux.conf as suggested in `man tmux`
bind R source-file '~/.tmux.conf'
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin '2kabhishek/tmux2k'
#########################
# use a theme
set -g @tmux2k-theme 'catppuccin'
# to show icons only
set -g @tmux2k-icons-only true
# to customize duo bg and fg
set -g @tmux2k-duo-fg "#1688f0" # this will get you duo blue shown above
set -g @tmux2k-duo-bg "#000000" # this will set the bg for duo theme
# to set powerline symbols
set -g @tmux2k-right-sep "█"
set -g @tmux2k-window-list-right-sep "█"
# to not show powerline
set -g @tmux2k-show-powerline false
# set session icon, accpets: `session`, 'window`, or any string
set -g @tmux2k-session-icon " #S" # `#W` for window name
# remove git plugin to avoid expensive `git status` on home directory repo
set -g @tmux2k-left-plugins "session cwd calc"
set -g @tmux2k-calc-colors "text yellow"
set -g @tmux2k-right-plugins "cpu ram copilot time"
set -g @tmux2k-copilot-colors "red black"

bind-key -n MouseDown1Status      select-window -t=
set -g @tmux2k-calc-icon "▶"
# Click the left status bar to open the launcher popup
bind-key -n MouseDown1StatusLeft run-shell "$HOME/.scripts/launcher-wrapper.sh"
# <prefix>p to open the launcher popup
bind-key P run-shell "$HOME/.scripts/launcher-wrapper.sh"
#########################

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @bitbucket.com:user/plugin'

# ── tmux-resurrect: Session persistence ───────────────────────────────────────
# Automatically saves tmux sessions and restores them on reconnect
set -g @resurrect-capture-pane-contents 'on'        # Save pane content (scrollback)
set -g @resurrect-strategy-vim 'session'            # Restore vim/nvim sessions
set -g @resurrect-processes 'zsh bash'              # Restore these shells/processes
set -g @resurrect-save-shell-history 'on'           # Preserve shell history

# Manual keybinds for save/restore:
#   prefix + Ctrl-s : save session
#   prefix + Ctrl-r : restore session

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# ── Notifications for long-running tasks ──────────────────────────────────────
set -g monitor-activity on
set -g visual-activity on
set -g bell-action any
set -g visual-bell off

# ── Activity monitoring ───────────────────────────────────────────────────────
set -g monitor-activity on
set -g visual-activity on
set -g bell-action any
